services:
  db:
    image: postgres:16-alpine
    container_name: atendemax-db
    environment:
      POSTGRES_DB: atendemax
      POSTGRES_USER: atendemax
      POSTGRES_PASSWORD: atendemax123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atendemax -d atendemax"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - atendemax-network

  backend:
    build: ./backend
    container_name: atendemax-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://atendemax:atendemax123@db:5432/atendemax
    depends_on:
      db:
        condition: service_healthy
    networks:
      - atendemax-network

  frontend:
    build: ./frontend
    container_name: atendemax-frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
    networks:
      - atendemax-network

volumes:
  postgres_data:

networks:
  atendemax-network:
    driver: bridge
